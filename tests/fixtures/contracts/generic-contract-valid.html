<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"></head>
<body>
<main data-diagram-type="business-flow" data-template-family="business-flow"
  data-template-id="swimlane-flow" data-template-layout="swimlane-flow">
  <h1>Contract fixture</h1>
  <section data-diagram-canvas data-diagram-contract="1" data-diagram-id="flow"
    data-diagram-profile="graph" data-diagram-width="auto" data-diagram-height="auto"
    data-diagram-mobile="stack">
    <div data-diagram-group-id="request-lane" data-semantic-role="lane">
      <article data-diagram-node-id="request" data-semantic-role="actor">Request</article>
      <article data-diagram-node-id="service" data-semantic-role="system">Service</article>
    </div>
    <span data-diagram-relation-id="request-service" data-from="request" data-to="service"
      data-relation-kind="flow" data-semantic="request handoff">Request to service</span>
    <article data-diagram-visible-relation-id="request-service"
      data-visible-relation-kind="edge">Request → Service</article>
  </section>
  <section data-fallback-for="flow">Request then service.</section>
</main>
</body>
</html>
